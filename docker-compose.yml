services:
  trading212-mcp:
    image: ghcr.io/nigelvanhattum/trading212-mcp:latest
    build: .
    ports:
      - "8000:8000"
    restart: unless-stopped
    # Configure via .env (create from .env.example) or a mounted config file.
    env_file:
      - path: .env
        required: false
    volumes:
      - ${TRADING212_CONFIG_DIR:-~/.config/trading212-mcp}:/config:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
